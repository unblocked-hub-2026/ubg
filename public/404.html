<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal - Basketball Stars & More</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #0a0a0a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .loading-container {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-message {
            display: none;
            color: #ef4444;
            max-width: 400px;
            padding: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-container" id="loader">
            <div class="spinner"></div>
            <p style="opacity: 0.6; letter-spacing: 1px; font-size: 14px; text-transform: uppercase;">Loading Game Portal...</p>
        </div>
        <div class="error-message" id="error-msg">
            <h2 style="margin-top: 0;">Oops! Something went wrong.</h2>
            <p>The application failed to load. This might be due to a missing build file or a network issue.</p>
            <p style="font-size: 14px; opacity: 0.8;">If you are seeing this on GitHub Pages, ensure you have built the project and are serving from the correct directory.</p>
        </div>
    </div>
    
    <!-- This script tag is for development. Vite replaces it during build. -->
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
        // Simple timeout to show error if React doesn't mount within 5 seconds
        setTimeout(() => {
            const root = document.getElementById('root');
            if (root && root.innerHTML.includes('Loading Game Portal...')) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
            }
        }, 5000);
    </script>
</body>
</html>
