<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        /* Simple styles for the loading screen only */
        #loader {
            position: fixed;
            inset: 0;
            background: #09090b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="color: white; opacity: 0.6; font-family: sans-serif; font-size: 14px;">Loading Games...</p>
    </div>
    
    <div id="root"></div>

    <script type="module" src="./src/main.tsx"></script>
    <script>
        // Remove loader once React starts
        window.addEventListener('load', () => {
            // Give it a tiny bit of extra time to be safe
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }, 500);
        });
    </script>
</body>
</html>
